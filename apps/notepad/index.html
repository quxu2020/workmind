<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>иЃ∞дЇЛжЬђ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
body{
  background:#0f0f1a;color:#e0e7ff;
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}

/* й°ґйГ®ж†П */
.topbar{
  height:50px;display:flex;align-items:center;gap:8px;
  padding:0 10px;flex-shrink:0;
  background:rgba(15,15,26,.95);
  border-bottom:1px solid rgba(99,102,241,.15);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:10;
}
.topbar .back-btn{
  width:32px;height:32px;border-radius:8px;
  background:rgba(99,102,241,.15);border:none;color:#a5b4fc;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.topbar .back-btn:hover{background:rgba(99,102,241,.25);}
.topbar .title{
  font-size:15px;font-weight:600;color:#c4b5fd;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.topbar .btn{
  padding:5px 10px;border-radius:7px;border:1px solid rgba(99,102,241,.3);
  background:rgba(99,102,241,.1);color:#a5b4fc;
  font-size:12px;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.topbar .btn:hover{background:rgba(99,102,241,.2);}
.topbar .btn.save{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);}
.topbar .btn.export{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:#6ee7b7;}
.topbar .btn.export:hover{background:rgba(16,185,129,.25);}
.topbar .btn.import{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.25);color:#fcd34d;}
.topbar .btn.import:hover{background:rgba(245,158,11,.2);}

/* дЇСзЂѓзКґжАБ */
.cloud-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5);
  transition:background .4s;margin-left:2px;
}
.cloud-dot.online{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5);}
.cloud-dot.syncing{background:#f59e0b;animation:cloudPulse 1s infinite;}
@keyframes cloudPulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* дЄїдљУеЄГе±А */
.main{
  flex:1;display:flex;overflow:hidden;
  min-height:0;
}

/* еЈ¶дЊІйЭҐжЭњ */
.side-panel{
  width:240px;flex-shrink:0;
  border-right:1px solid rgba(99,102,241,.12);
  display:flex;flex-direction:column;
  background:rgba(15,15,30,.6);
}

/* жЦЗдїґе§єеМЇеЯЯ */
.folder-section{
  border-bottom:1px solid rgba(99,102,241,.1);
  display:flex;flex-direction:column;
}
.folder-header{
  padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
}
.folder-header span{font-size:12px;color:#818cf8;font-weight:600;}
.folder-header button{
  width:24px;height:24px;border-radius:6px;
  background:rgba(99,102,241,.2);border:none;color:#a5b4fc;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.folder-header button:hover{background:rgba(99,102,241,.35);}
.folder-list{
  padding:0 6px 8px;overflow-y:auto;max-height:180px;
}
.folder-list::-webkit-scrollbar{width:3px;}
.folder-list::-webkit-scrollbar-thumb{background:rgba(99,102,241,.15);border-radius:2px;}

.folder-item{
  padding:6px 10px;border-radius:6px;cursor:pointer;
  font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:6px;
  transition:background .12s;margin-bottom:1px;
}
.folder-item:hover{background:rgba(99,102,241,.08);}
.folder-item.active{background:rgba(99,102,241,.15);color:#a5b4fc;}
.folder-item .fi-icon{font-size:14px;flex-shrink:0;}
.folder-item .fi-count{font-size:11px;color:#64748b;margin-left:auto;flex-shrink:0;}
.folder-item.active .fi-count{color:#818cf8;}
.folder-item .fi-del{
  width:18px;height:18px;border-radius:4px;flex-shrink:0;
  background:none;border:none;color:#64748b;font-size:12px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  line-height:1;
}
.folder-item .fi-rename{
  width:18px;height:18px;border-radius:4px;flex-shrink:0;
  background:none;border:none;color:#64748b;font-size:10px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  line-height:1;
}
.folder-item:hover .fi-del{display:flex;}
.folder-item:hover .fi-rename{display:flex;}
.folder-item .fi-del:hover{background:rgba(239,68,68,.15);color:#f87171;}
.folder-item .fi-rename:hover{background:rgba(99,102,241,.15);color:#a5b4fc;}
.folder-item .fi-rename-input{
  flex:1;min-width:0;padding:2px 6px;border-radius:4px;
  border:1px solid rgba(99,102,241,.4);background:rgba(15,15,26,.8);
  color:#e0e7ff;font-size:12px;outline:none;
}
.folder-item.renaming .fi-name{display:none;}
.folder-item.renaming .fi-count{display:none;}
.folder-item.renaming .fi-rename{display:none;}
.folder-item.renaming .fi-del{display:none;}
.folder-item.renaming{cursor:default;}
.folder-item.renaming:hover{background:rgba(99,102,241,.08);}

/* зђФиЃ∞еИЧи°®еМЇеЯЯ */
.note-section{
  flex:1;display:flex;flex-direction:column;
  min-height:0;
}
.note-list-header{
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;
}
.note-list-header span{font-size:12px;color:#818cf8;font-weight:600;}
.note-list-header button{
  width:24px;height:24px;border-radius:6px;
  background:rgba(99,102,241,.2);border:none;color:#a5b4fc;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.note-list-header button:hover{background:rgba(99,102,241,.35);}
.note-items{
  flex:1;overflow-y:auto;padding:4px 6px;
}
.note-items::-webkit-scrollbar{width:4px;}
.note-items::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:2px;}

.note-item{
  padding:8px 10px;border-radius:7px;cursor:pointer;
  margin-bottom:2px;transition:background .15s;
  display:flex;align-items:center;gap:6px;position:relative;
}
.note-item:hover{background:rgba(99,102,241,.08);}
.note-item.active{background:rgba(99,102,241,.15);}
.note-item .ni-icon{font-size:14px;flex-shrink:0;}
.note-item .ni-text{flex:1;min-width:0;}
.note-item .ni-title{
  font-size:12px;color:#c4b5fd;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.note-item .ni-meta{
  font-size:10px;color:#64748b;margin-top:1px;
  display:flex;gap:6px;align-items:center;
}
.note-item .ni-folder-tag{
  font-size:9px;background:rgba(99,102,241,.15);color:#818cf8;
  padding:1px 5px;border-radius:4px;
}
.note-item .ni-actions{display:none;gap:2px;flex-shrink:0;}
.note-item:hover .ni-actions{display:flex;}
.ni-act-btn{
  width:22px;height:22px;border-radius:5px;flex-shrink:0;
  background:none;border:none;color:#64748b;font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.ni-act-btn:hover{background:rgba(99,102,241,.15);color:#a5b4fc;}
.ni-act-btn.danger:hover{background:rgba(239,68,68,.15);color:#f87171;}

/* зЉЦиЊСеМЇеЯЯ */
.editor-area{
  flex:1;display:flex;min-width:0;
}

/* Markdown зЉЦиЊСеЩ® */
.md-editor{
  flex:1;display:flex;flex-direction:column;min-width:0;
  border-right:1px solid rgba(99,102,241,.08);
}

/* еЈ•еЕЈж†П */
.toolbar{
  display:flex;gap:3px;padding:6px 10px;flex-wrap:wrap;
  border-bottom:1px solid rgba(99,102,241,.08);
  flex-shrink:0;align-items:center;
}
.toolbar button{
  width:28px;height:28px;border-radius:6px;
  background:rgba(99,102,241,.08);border:1px solid transparent;
  color:#94a3b8;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.toolbar button:hover{background:rgba(99,102,241,.18);color:#c4b5fd;border-color:rgba(99,102,241,.25);}
.toolbar .sep{width:1px;height:20px;background:rgba(99,102,241,.12);margin:0 4px;}
.toolbar .tb-folder{
  margin-left:auto;width:auto;padding:0 10px;font-size:11px;
  background:rgba(99,102,241,.08);color:#818cf8;gap:4px;
}

/* жЦЗжЬђеМЇ */
.editor-wrap{
  flex:1;overflow:hidden;position:relative;
}
.editor-wrap textarea{
  width:100%;height:100%;border:none;outline:none;resize:none;
  background:transparent;color:#e0e7ff;font-size:14px;
  line-height:1.7;padding:16px;font-family:"JetBrains Mono","Fira Code","Consolas",monospace;
  tab-size:2;
}
.editor-wrap textarea::placeholder{color:#475569;}

/* йҐДиІИеМЇ */
.preview-area{
  flex:1;overflow-y:auto;padding:16px;
  min-width:0;
}
.preview-area::-webkit-scrollbar{width:4px;}
.preview-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:2px;}

/* Markdown йҐДиІИж†ЈеЉП */
.preview-content{font-size:14px;line-height:1.8;color:#cbd5e1;word-wrap:break-word;}
.preview-content h1{font-size:22px;color:#e0e7ff;margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(99,102,241,.15);}
.preview-content h2{font-size:18px;color:#e0e7ff;margin:16px 0 8px;}
.preview-content h3{font-size:15px;color:#c4b5fd;margin:14px 0 6px;}
.preview-content p{margin:8px 0;}
.preview-content strong{color:#fbbf24;font-weight:600;}
.preview-content em{color:#94a3b8;font-style:italic;}
.preview-content code{
  background:rgba(99,102,241,.15);color:#fbbf24;
  padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace;
}
.preview-content pre{
  background:rgba(15,20,35,.8);border:1px solid rgba(99,102,241,.15);
  border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;
}
.preview-content pre code{background:none;padding:0;color:#cbd5e1;}
.preview-content ul,.preview-content ol{padding-left:20px;margin:8px 0;}
.preview-content li{margin:4px 0;}
.preview-content blockquote{
  border-left:3px solid #6366f1;padding:8px 14px;
  margin:10px 0;background:rgba(99,102,241,.06);
  border-radius:0 8px 8px 0;color:#94a3b8;
}
.preview-content a{color:#818cf8;text-decoration:underline;}
.preview-content table{width:100%;border-collapse:collapse;margin:10px 0;}
.preview-content th,.preview-content td{
  border:1px solid rgba(99,102,241,.15);padding:8px 12px;text-align:left;
}
.preview-content th{background:rgba(99,102,241,.08);color:#a5b4fc;font-weight:600;}
.preview-content hr{border:none;border-top:1px solid rgba(99,102,241,.15);margin:16px 0;}
.preview-content img{max-width:100%;border-radius:8px;}

/* ж®°жАБж°Ж */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);z-index:200;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .15s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-dialog{
  background:#1a1a2e;border:1px solid rgba(99,102,241,.2);
  border-radius:14px;padding:24px;width:340px;max-width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-dialog h3{font-size:16px;color:#c4b5fd;margin-bottom:16px;}
.modal-dialog label{display:block;font-size:12px;color:#818cf8;margin-bottom:6px;}
.modal-dialog input{
  width:100%;padding:10px 14px;border-radius:8px;
  border:1px solid rgba(99,102,241,.25);background:rgba(15,15,30,.6);
  color:#e0e7ff;font-size:14px;outline:none;
  transition:border-color .15s;
}
.modal-dialog input:focus{border-color:rgba(99,102,241,.5);}
.modal-dialog .modal-select{
  width:100%;padding:10px 14px;border-radius:8px;
  border:1px solid rgba(99,102,241,.25);background:rgba(15,15,30,.6);
  color:#e0e7ff;font-size:14px;outline:none;cursor:pointer;
}
.modal-dialog .modal-select option{background:#1a1a2e;color:#e0e7ff;}
.modal-dialog .modal-actions{
  display:flex;gap:10px;margin-top:18px;justify-content:flex-end;
}
.modal-dialog .modal-actions button{
  padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;
  border:1px solid rgba(99,102,241,.3);
  background:rgba(99,102,241,.1);color:#a5b4fc;
  transition:background .15s;
}
.modal-dialog .modal-actions button:hover{background:rgba(99,102,241,.2);}
.modal-dialog .modal-actions button.primary{
  background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);
}
.modal-dialog .modal-actions button.danger{
  background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.25);color:#f87171;
}

/* зКґжАБжПРз§Ї */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(99,102,241,.9);color:#fff;padding:8px 20px;
  border-radius:20px;font-size:13px;z-index:300;
  transition:transform .3s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* зІїеК®зЂѓйАВйЕН */
.mobile-tabs{display:none;}
.mobile-top-actions{display:none;}

/* дЄКдЄЛжЦЗиПЬеНХ */
.context-menu{
  position:fixed;z-index:250;
  background:#1a1a2e;border:1px solid rgba(99,102,241,.2);
  border-radius:10px;padding:4px;min-width:140px;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:fadeIn .1s;
}
.context-menu-item{
  padding:8px 14px;border-radius:6px;font-size:12px;
  color:#c4b5fd;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background .1s;
}
.context-menu-item:hover{background:rgba(99,102,241,.15);}
.context-menu-item.danger{color:#f87171;}
.context-menu-sep{height:1px;background:rgba(99,102,241,.1);margin:4px 0;}

@media(max-width:768px){
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .topbar{height:48px;padding:0 8px;gap:6px;}
  .topbar .back-btn{width:36px;height:36px;font-size:20px;border-radius:8px;}
  .topbar .btn{font-size:11px;padding:6px 8px;border-radius:7px;}
  .topbar .title{font-size:14px;}
  .topbar .btn.export,.topbar .btn.import{display:none;}
  .side-panel{display:none;}
  .side-panel.mobile-show{
    display:flex;position:fixed;top:48px;left:0;bottom:0;width:280px;
    z-index:50;background:#0f0f1a;border-right:1px solid rgba(99,102,241,.2);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .editor-area{flex-direction:column;}
  .preview-area{display:none;}
  .preview-area.mobile-show{display:block;flex:1;}
  .md-editor{border-right:none;}
  .md-editor.mobile-hide{display:none;}
  .toolbar{padding:4px 6px;gap:1px;}
  .toolbar button{width:30px;height:30px;border-radius:6px;font-size:12px;}
  .toolbar .sep{margin:0 2px;}
  .toolbar .tb-folder{font-size:10px;padding:0 6px;}
  .editor-wrap textarea{font-size:16px;padding:12px;}
  .mobile-tabs{
    display:flex;gap:0;padding:4px 8px;flex-shrink:0;
    border-bottom:1px solid rgba(99,102,241,.08);
  }
  .mobile-tabs button{
    flex:1;padding:10px 6px;border-radius:8px;
    background:transparent;border:1px solid transparent;
    color:#64748b;font-size:13px;cursor:pointer;text-align:center;
    transition:all .15s;
  }
  .mobile-tabs button.active{
    background:rgba(99,102,241,.15);color:#a5b4fc;
    border-color:rgba(99,102,241,.25);
  }
  .mobile-top-actions{
    display:flex;justify-content:center;gap:8px;
    padding:6px 10px;flex-shrink:0;
    border-bottom:1px solid rgba(99,102,241,.08);
  }
  .mobile-top-actions button{
    padding:5px 14px;border-radius:7px;font-size:12px;
    background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);
    color:#a5b4fc;cursor:pointer;
  }
  .mobile-top-actions .mta-imp{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.2);color:#fcd34d;}
  .mobile-top-actions .mta-exp{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.2);color:#6ee7b7;}
  .toast{bottom:30px;padding:8px 18px;font-size:12px;}
}

/* з©ЇзКґжАБ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:#475569;gap:12px;
}
.empty-state .empty-icon{font-size:48px;}
.empty-state .empty-text{font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goDesktop()" title="ињФеЫЮж°МйЭҐ">вЧВ</button>
  <div class="title" id="noteTitle">жЬ™еСљеРНзђФиЃ∞</div>
  <button class="btn" id="listToggle" onclick="toggleList()">вШ∞ еИЧи°®</button>
  <button class="btn import" onclick="triggerImport()" title="еѓЉеЕ• .md жЦЗдїґ">рЯУ• еѓЉеЕ•</button>
  <button class="btn export" onclick="exportCurrentNote()" title="еѓЉеЗЇељУеЙНзђФиЃ∞">рЯУ§ еѓЉеЗЇ</button>
  <button class="btn save" onclick="saveNote()">рЯТЊ дњЭе≠Ш</button>
  <div class="cloud-dot" id="cloudDot" title="дЇСзЂѓ"></div>
</div>

<!-- зІїеК®зЂѓењЂжНЈжУНдљЬ -->
<div class="mobile-top-actions" id="mobileTopActions">
  <button onclick="toggleList()">рЯУБ зЫЃељХ</button>
  <button class="mta-imp" onclick="triggerImport()">рЯУ• еѓЉеЕ•MD</button>
  <button class="mta-exp" onclick="exportCurrentNote()">рЯУ§ еѓЉеЗЇMD</button>
</div>

<!-- зІїеК®зЂѓзЉЦиЊС/йҐДиІИеИЗжНҐ -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="active" onclick="switchTab('edit')">вЬПпЄП зЉЦиЊС</button>
  <button onclick="switchTab('preview')">рЯСБ йҐДиІИ</button>
</div>

<div class="main">
  <!-- еЈ¶дЊІйЭҐжЭњ -->
  <div class="side-panel" id="sidePanel">
    <!-- жЦЗдїґе§єеМЇеЯЯ -->
    <div class="folder-section">
      <div class="folder-header">
        <span>рЯУБ жЦЗдїґе§є</span>
        <button onclick="showNewFolderModal()" title="жЦ∞еїЇжЦЗдїґе§є">+</button>
      </div>
      <div class="folder-list" id="folderList"></div>
    </div>

    <!-- зђФиЃ∞еИЧи°®еМЇеЯЯ -->
    <div class="note-section">
      <div class="note-list-header">
        <span id="noteSectionTitle">рЯУЛ еЕ®йГ®зђФиЃ∞</span>
        <button onclick="newNote()" title="жЦ∞еїЇзђФиЃ∞">+</button>
      </div>
      <div class="note-items" id="noteItems"></div>
    </div>
  </div>

  <!-- зЉЦиЊСеМЇеЯЯ -->
  <div class="editor-area">
    <div class="md-editor" id="mdEditor">
      <div class="toolbar">
        <button onclick="insertMD('**','**')" title="еК†з≤Ч">B</button>
        <button onclick="insertMD('*','*')" title="жЦЬдљУ"><i>I</i></button>
        <button onclick="insertMD('~~','~~')" title="еИ†йЩ§зЇњ"><s>S</s></button>
        <span class="sep"></span>
        <button onclick="insertMD('# ','')" title="ж†ЗйҐШ1">H1</button>
        <button onclick="insertMD('## ','')" title="ж†ЗйҐШ2">H2</button>
        <button onclick="insertMD('### ','')" title="ж†ЗйҐШ3">H3</button>

function startRenameFolder(e,oldName){
  if(!e||!e.target)return;
  var item=e.target.closest('.folder-item');
  if(!item)return;
  item.classList.add("renaming");
  item.onclick=function(ev){ev.stopPropagation();}; // йШїж≠ҐзВєеЗїйАЙжЛ©

  // еИЫеїЇиЊУеЕ•ж°Ж
  var input=document.createElement("input");
  input.className="fi-rename-input";
  input.value=oldName;
  input.maxLength=30;
  var fiName=item.querySelector(".fi-name");
  fiName.parentNode.insertBefore(input,fiName.nextSibling);

  input.focus();
  input.select();

  function finish(save){
    item.classList.remove("renaming");
    item.onclick=function(){selectFolder(oldName);};
    if(input.parentNode)input.remove();
    if(!save)return; // еПЦжґИ

    var newName=input.value.trim();
    if(!newName||newName===oldName)return;
    if(folders.indexOf(newName)>=0){showToast("жЦЗдїґе§єеРНеЈ≤е≠ШеЬ®");return;}
    // жЫіжЦ∞ folders жХ∞зїД
    var idx=folders.indexOf(oldName);
    if(idx>=0)folders[idx]=newName;
    // жЫіжЦ∞зђФиЃ∞дЄ≠зЪД folder е≠ЧжЃµ
    notes.forEach(function(n){if((n.folder||"йїШиЃ§")===oldName)n.folder=newName;});
    // жЫіжЦ∞ељУеЙНйАЙдЄ≠
    if(currentFolder===oldName)currentFolder=newName;
    // ељїеЇХйЗНеїЇ DOM йБњеЕНжЃЛзХЩ
    saveFolders();
    saveAllNotes();
    renderFolders();
    renderList();
    showToast("вЬУ еЈ≤йЗНеСљеРНпЉЪгАМ"+oldName+"гАНвЖТгАМ"+newName+"гАН");
  }

  input.addEventListener("keydown",function(ev){
    if(ev.key==="Enter"){ev.preventDefault();finish(true);}
    if(ev.key==="Escape"){ev.preventDefault();finish(false);}
  });
  input.addEventListener("blur",function(){finish(true);});
}

function pullNotesFromCloud(cb){
  setCloudStatus("syncing");
  fetch(JSONBIN_USER_URL+"/latest",{
    method:"GET",headers:{"X-Master-Key":JSONBIN_USER_KEY}
  }).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  }).then(function(data){
    var cloudNotes=data.record.notes||[];
    var cloudFolders=data.record.folders||null;
    if(cloudNotes.length>0){
      notes=cloudNotes;
      // ињБзІїж≤°жЬЙ folder е≠ЧжЃµзЪДжЧІзђФиЃ∞
      notes.forEach(function(n){if(!n.folder)n.folder="йїШиЃ§";});
    }
    if(cloudFolders&&cloudFolders.length>0)folders=cloudFolders;
    saveAllNotesLocal();
    saveFolders();
    setCloudStatus("online");
    if(cb)cb(cloudNotes);
  }).catch(function(){
    setCloudStatus("offline");
    if(cb)cb(null);
  });
}

function saveAllNotesLocal(){
  localStorage.setItem(NOTES_KEY,JSON.stringify(notes));

function saveAllNotes(){
  saveAllNotesLocal();

}

function pushAllToCloud(){
  setCloudStatus("syncing");
  var remList=[];
  try{remList=JSON.parse(localStorage.getItem("reminders_v1")||"[]");}catch(e){}
  var data={notes:notes,folders:folders,reminders:remList,updatedAt:Date.now()};
  fetch(JSONBIN_USER_URL,{
    method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_USER_KEY,"X-Bin-Versioning":"false"},
    body:JSON.stringify(data)
  }).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    setCloudStatus("online");
  }).catch(function(){setCloudStatus("offline");});
}

function syncRemindersToCloud(reminders){
  setCloudStatus("syncing");
  fetch(JSONBIN_USER_URL+"/latest",{
    method:"GET",headers:{"X-Master-Key":JSONBIN_USER_KEY}
  }).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}).then(function(existing){
    var cloudNotes=notes;
    var cloudFolders=folders;
    if(existing&&existing.record){
      cloudNotes=existing.record.notes||notes;
      cloudFolders=existing.record.folders||folders;
    }
    var data={notes:cloudNotes,folders:cloudFolders,reminders:reminders,updatedAt:Date.now()};
    return fetch(JSONBIN_USER_URL,{
      method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_USER_KEY,"X-Bin-Versioning":"false"},
      body:JSON.stringify(data)
    });
  }).then(function(r){
    if(r&&!r.ok)throw new Error("HTTP "+r.status);
    setCloudStatus("online");
  }).catch(function(){setCloudStatus("offline");});
}

        updatePreview();

  input.value="";
}

function downloadMD(note){
  var content=note.content||"";
  var title=note.title||"жЬ™еСљеРНзђФиЃ∞";
  // жЦЗдїґеРНпЉЪеОїйЩ§дЄНеЃЙеЕ®е≠Чзђ¶
  var filename=title.replace(/[<>:"/\\|?*]/g,"_").slice(0,80)||"зђФиЃ∞";
  filename+=".md";
  var blob=new Blob([content],{type:"text/markdown;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("вЬУ еЈ≤дЄЛиљљ: "+filename);
}

// ======== Markdown жЄ≤жЯУ ========
function parseMD(text){
  if(!text)return"";
  var html=escHtml(text);
  
  // дї£з†БеЭЧ
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    return '<pre><code>'+code.trim()+'</code></pre>';
  });
  
  // и°МеЖЕдї£з†Б
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  
  // ж†ЗйҐШ
  html=html.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  
  // еК†з≤Ч / жЦЬдљУ / еИ†йЩ§зЇњ
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
  
  // йУЊжО• & еЫЊзЙЗ
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  
  // ж∞іеє≥зЇњ
  html=html.replace(/^---+$/gm,'<hr>');
  
  // еЉХзФ®еЭЧ
  html=html.replace(/(^> .+(\n> .+)*)/gm,function(m){
    var lines=m.split("\n").map(function(l){return l.replace(/^> /,"");});
    return '<blockquote>'+lines.join("<br>")+'</blockquote>';
  });
  
  // жЧ†еЇПеИЧи°®
  html=html.replace(/(^[\-\*] .+(\n[\-\*] .+)*)/gm,function(m){
    var items=m.split("\n").filter(function(l){return l.match(/^[\-\*] /);})
      .map(function(l){return'<li>'+l.replace(/^[\-\*] /,"")+'</li>';});
    return'<ul>'+items.join("")+'</ul>';
  });
  
  // жЬЙеЇПеИЧи°®
  html=html.replace(/(^\d+\. .+(\n\d+\. .+)*)/gm,function(m){
    var items=m.split("\n").filter(function(l){return l.match(/^\d+\. /);})
      .map(function(l){return'<li>'+l.replace(/^\d+\. /,"")+'</li>';});
    return'<ol>'+items.join("")+'</ol>';
  });
  
  // и°®ж†Љ
  html=html.replace(/(\|[^\n]+\|\n\|[\- |]+\|\n(\|[^\n]+\|\n?)*)/g,function(m){
    var lines=m.trim().split("\n");
    var header=lines[0];lines=lines.slice(2);
    var hcells=header.split("|").filter(function(c){return c.trim();});
    var thead='<thead><tr>'+hcells.map(function(c){return'<th>'+c.trim()+'</th>';}).join("")+'</tr></thead>';
    var tbody='<tbody>'+lines.map(function(l){
      var cells=l.split("|").filter(function(c){return c.trim();});
      return'<tr>'+cells.map(function(c){return'<td>'+c.trim()+'</td>';}).join("")+'</tr>';
    }).join("")+'</tbody>';
    return'<table>'+thead+tbody+'</table>';
  });
  
  // жЃµиРљ
  var paras=html.split(/\n\n+/);
  html=paras.map(function(p){
    p=p.trim();if(!p)return"";
    if(/^<(h[1-4]|ul|ol|pre|table|blockquote|hr|img)/.test(p))return p;
    return"<p>"+p.replace(/\n/g,"<br>")+"</p>";
  }).join("\n");
  
  return html;
}

function updatePreview(){
  var text=document.getElementById("editor").value;
  document.getElementById("preview").innerHTML=parseMD(text)||'<div class="empty-state"><div class="empty-icon">рЯУЭ</div><div class="empty-text">йҐДиІИе∞ЖеЬ®ињЩйЗМжШЊз§Ї</div></div>';
}

// ======== жПТеЕ• Markdown ========
function insertMD(before,after){
  var ta=document.getElementById("editor");
  var start=ta.selectionStart,end=ta.selectionEnd;
  var text=ta.value;
  var selected=text.substring(start,end);
  var replacement=before+selected+after;
  ta.value=text.substring(0,start)+replacement+text.substring(end);
  var newCursor=start+before.length+selected.length;
  ta.focus();ta.setSelectionRange(newCursor,newCursor);
  updatePreview();autoSave();
}

// ======== ж†Зж≥®жПРйЖТ ========
function setReminder(){
  var ta=document.getElementById("editor");
  var selected=ta.value.substring(ta.selectionStart,ta.selectionEnd).trim();
  if(!selected){showToast("вЪ† иѓЈеЕИйАЙдЄ≠и¶БжПРйЖТзЪДжЦЗе≠Ч");return;}

  var note=notes.find(function(n){return n.id===currentId;});
  var noteTitle=note?note.title:"жЬ™еСљеРНзђФиЃ∞";

  var REM_KEY="reminders_v1";
  var list=[];
  try{list=JSON.parse(localStorage.getItem(REM_KEY)||"[]");}catch(e){}

  list.unshift({text:selected,time:Date.now(),noteTitle:noteTitle});
  if(list.length>50)list=list.slice(0,50);

  localStorage.setItem(REM_KEY,JSON.stringify(list));
  syncRemindersToCloud(list);
  showToast("рЯФФ еЈ≤жЈїеК†жПРйЖТпЉЪ"+selected.slice(0,20)+(selected.length>20?"вА¶":""));
  ta.focus();
}

// ======== ж®°жАБж°Ж ========
var modalCb=null;

function showModal(title,bodyHtml,btns){
  closeModal();
  var ov=document.createElement("div");
  ov.className="modal-overlay";ov.id="modalOverlay";
  ov.innerHTML='<div class="modal-dialog"><h3>'+title+'</h3>'+bodyHtml+
    '<div class="modal-actions">'+btns.map(function(b,i){
      return'<button class="'+(b.cls||"")+'" onclick="modalAction('+i+')">'+b.text+'</button>';
    }).join("")+'</div></div>';
  ov.onclick=function(e){if(e.target===ov)closeModal();};
  document.body.appendChild(ov);
  modalCb=btns;
}

function modalAction(i){
  if(modalCb&&modalCb[i]&&modalCb[i].action)modalCb[i].action();
}

function closeModal(){
  var ov=document.getElementById("modalOverlay");
  if(ov)ov.remove();
  modalCb=null;
}
