<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>我的工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
body{
  background:linear-gradient(135deg,#0f0c29 0%,#1a1a3e 30%,#24243e 60%,#0f0c29 100%);
  display:flex;flex-direction:column;align-items:center;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.top-area{
  width:100%;max-width:500px;
  padding:40px 30px 20px;
  display:flex;flex-direction:column;align-items:center;
}
.clock{
  font-size:64px;font-weight:200;color:#e0e7ff;
  letter-spacing:2px;line-height:1;
}
.date-row{
  margin-top:8px;font-size:15px;color:#818cf8;
  display:flex;gap:8px;align-items:center;
}
.date-row span{color:#6366f1;}

.app-grid{
  width:100%;max-width:500px;
  flex:1;display:flex;flex-wrap:wrap;
  align-content:flex-start;justify-content:center;
  padding:30px 20px 60px;gap:20px 24px;
  overflow-y:auto;
}
.app-item{
  width:74px;display:flex;flex-direction:column;
  align-items:center;cursor:pointer;
  transition:transform .15s;
}
.app-item:active{transform:scale(.92);}
.app-icon{
  width:64px;height:64px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  transition:box-shadow .2s,transform .2s;
}
.app-item:hover .app-icon{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.app-label{
  margin-top:8px;font-size:12px;color:#c4b5fd;
  text-align:center;line-height:1.3;max-width:74px;
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;
}
.icon-notepad{background:linear-gradient(135deg,#f59e0b,#d97706);}
.icon-mindmap{background:linear-gradient(135deg,#6366f1,#4f46e5);}
.icon-backup{background:linear-gradient(135deg,#10b981,#059669);}

/* 云端状态 */
.cloud-status{
  position:absolute;top:4px;right:4px;
  width:8px;height:8px;border-radius:50%;
  background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5);
  transition:background .4s;
}
.cloud-status.online{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.5);}
.cloud-status.syncing{background:#f59e0b;animation:pulse 1s infinite;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* 提醒卡片 */
.reminders-widget{
  width:100%;max-width:500px;
  margin:0 20px 16px;padding:14px 16px;
  background:rgba(15,12,41,.5);
  border:1px solid rgba(99,102,241,.12);
  border-radius:16px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  max-height:200px;overflow-y:auto;
  flex-shrink:0;
}
.reminders-widget::-webkit-scrollbar{width:3px;}
.reminders-widget::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:2px;}
.rem-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  font-size:13px;color:#818cf8;font-weight:600;
}
.rem-header .rem-count{
  background:rgba(99,102,241,.2);color:#a5b4fc;
  font-size:11px;padding:2px 8px;border-radius:10px;
}
.rem-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;border-bottom:1px solid rgba(99,102,241,.06);
  transition:all .2s;
}
.rem-item:last-child{border-bottom:none;}
.rem-dot{
  width:8px;height:8px;border-radius:50%;
  background:#f59e0b;flex-shrink:0;margin-top:5px;
  box-shadow:0 0 8px rgba(245,158,11,.4);
}
.rem-body{flex:1;min-width:0;}
.rem-text{
  font-size:13px;color:#e0e7ff;line-height:1.5;
  word-break:break-word;
}
.rem-meta{
  font-size:11px;color:#475569;margin-top:3px;
  display:flex;gap:8px;align-items:center;
}
.rem-meta .rem-source{color:#6366f1;}
.rem-close{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  background:none;border:none;color:#475569;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.rem-close:hover{background:rgba(239,68,68,.15);color:#f87171;}
.rem-empty{
  text-align:center;padding:20px 0;color:#334155;
  font-size:13px;
}

.bottom-bar{
  width:100%;max-width:500px;
  height:56px;display:flex;align-items:center;justify-content:center;
  gap:12px;padding:0 20px;
  background:rgba(15,12,41,.6);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(99,102,241,.15);
}
.bottom-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(99,102,241,.4);transition:all .3s;
}
.bottom-dot.active{background:#6366f1;width:24px;border-radius:4px;}

/* 移动端适配 */
@media(min-width:768px){
  .app-grid{justify-content:flex-start;padding-left:40px;}
  .top-area{padding-top:20px;}
  .clock{font-size:48px;}
}
@media(max-width:768px){
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  .top-area{padding:20px 20px 12px;}
  .clock{font-size:52px;}
  .date-row{font-size:14px;}
  .app-grid{gap:22px 28px;padding:20px 16px 70px;}
  .app-item{width:76px;}
  .app-icon{width:62px;height:62px;font-size:30px;border-radius:15px;}
  .app-label{font-size:11px;max-width:76px;}
  .app-label{-webkit-tap-highlight-color:transparent;}
  .reminders-widget{margin:0 12px 14px;padding:12px 14px;border-radius:14px;max-height:160px;}
  .rem-text{font-size:12px;}
  .rem-close{width:28px;height:28px;font-size:18px;}
  .bottom-bar{height:50px;padding-bottom:env(safe-area-inset-bottom,8px);}
}
@media(max-width:380px){
  .clock{font-size:42px;}
  .date-row{font-size:12px;}
  .app-grid{gap:18px 18px;padding:16px 10px 60px;}
  .app-item{width:68px;}
  .app-icon{width:54px;height:54px;font-size:26px;border-radius:13px;}
  .app-label{font-size:10px;max-width:68px;}
}
</style>
</head>
<body>

<div class="top-area">
  <div class="clock" id="clock">17:08</div>
  <div class="date-row">
    <span id="weekday">周六</span>
    <span id="dateStr">6月27日</span>
    <div class="cloud-status" id="cloudDot" title="云端: 连接中..."></div>
  </div>
</div>

<div class="app-grid" id="appGrid"></div>

<div class="reminders-widget" id="remindersWidget">
  <div class="rem-header">🔔 提醒 <span class="rem-count" id="remCount">0</span></div>
  <div id="remindersList"></div>
</div>

<div class="bottom-bar" id="bottomBar"></div>

<script>
function updateClock(){
  var n=new Date();
  var h=String(n.getHours()).padStart(2,"0");
  var m=String(n.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent=h+":"+m;
  var days=["周日","周一","周二","周三","周四","周五","周六"];
  document.getElementById("weekday").textContent=days[n.getDay()];
  document.getElementById("dateStr").textContent=(n.getMonth()+1)+"月"+n.getDate()+"日";
}
updateClock();setInterval(updateClock,10000);

var apps=[
  {id:"notepad",label:"记事本",icon:"📝",cls:"icon-notepad",url:"apps/notepad/index.html"},
  {id:"mindmap",label:"手机矩阵",icon:"📱",cls:"icon-mindmap",url:"mindmap.html"},
  {id:"backup",label:"打包备份",icon:"💾",cls:"icon-backup",url:"#",action:"downloadBackup"}
];

var grid=document.getElementById("appGrid");
var bar=document.getElementById("bottomBar");

apps.forEach(function(app,i){
  var item=document.createElement("div");
  item.className="app-item";
  item.innerHTML='<div class="app-icon '+app.cls+'">'+app.icon+'</div><div class="app-label">'+app.label+'</div>';
  if(app.action){
    item.onclick=window[app.action];
  }else{
    item.onclick=function(){location.href=app.url;};
  }
  grid.appendChild(item);

  var dot=document.createElement("div");
  dot.className="bottom-dot"+(i===0?" active":"");
  bar.appendChild(dot);
});

// ======== 提醒功能 + 云端同步 ========
var REM_KEY="reminders_v1";
var JSONBIN_USER_ID="6a41defdda38895dfe0dcf54";
var JSONBIN_USER_KEY="$2a$10$XjHR1OjZ73SbwYC4Xc8LTO5/Ym.afUvvaLO8K258IsXVUU.W5vbS.";
var JSONBIN_USER_URL="https://api.jsonbin.io/v3/b/"+JSONBIN_USER_ID;

function loadReminders(){
  try{return JSON.parse(localStorage.getItem(REM_KEY)||"[]");}
  catch(e){return[];}
}

function saveReminders(list){
  localStorage.setItem(REM_KEY,JSON.stringify(list));
  pushRemindersToCloud(list);
}

// 只推送提醒到云端（保留云端笔记不覆盖）
function pushRemindersToCloud(reminders){
  setCloudStatus("syncing");
  fetch(JSONBIN_USER_URL+"/latest",{
    method:"GET",headers:{"X-Master-Key":JSONBIN_USER_KEY}
  }).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}).then(function(existing){
    var cloudNotes=[];
    if(existing&&existing.record)cloudNotes=existing.record.notes||[];
    var data={notes:cloudNotes,reminders:reminders,updatedAt:Date.now()};
    return fetch(JSONBIN_USER_URL,{
      method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_USER_KEY,"X-Bin-Versioning":"false"},
      body:JSON.stringify(data)
    });
  }).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    setCloudStatus("online");
  }).catch(function(){setCloudStatus("offline");});
}

// 从云端拉取
function pullFromCloud(){
  setCloudStatus("syncing");
  fetch(JSONBIN_USER_URL+"/latest",{
    method:"GET",headers:{"X-Master-Key":JSONBIN_USER_KEY}
  }).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  }).then(function(data){
    var localRem=loadReminders();
    var cloudRem=(data.record.reminders||[]);
    var merged=mergeReminders(localRem,cloudRem);
    saveRemindersLocal(merged);
    renderReminders();
    setCloudStatus("online");
  }).catch(function(){
    setCloudStatus("offline");
    renderReminders();
  });
}

function mergeReminders(local,cloud){
  var seen={},result=[];
  (cloud.concat(local)).forEach(function(r){
    var key=r.text+"|"+r.time;
    if(!seen[key]){seen[key]=true;result.push(r);}
  });
  return result.slice(0,50);
}

function saveRemindersLocal(list){
  localStorage.setItem(REM_KEY,JSON.stringify(list));
}

function setCloudStatus(s){
  var dot=document.getElementById("cloudDot");
  if(!dot)return;
  dot.classList.remove("online","syncing");
  if(s==="online")dot.classList.add("online");
  if(s==="syncing")dot.classList.add("syncing");
  dot.title="云端: "+(s==="online"?"已连接":s==="syncing"?"同步中":"离线");
}

function renderReminders(){
  var list=loadReminders();
  var el=document.getElementById("remindersList");
  document.getElementById("remCount").textContent=list.length;

  if(list.length===0){
    el.innerHTML='<div class="rem-empty">📭 暂无提醒<br><span style="font-size:12px;color:#1e293b;">在记事本中选中文字 → 点🔔即可添加</span></div>';
    return;
  }

  el.innerHTML=list.map(function(r,i){
    var t=new Date(r.time);
    var ts=(t.getMonth()+1)+"月"+t.getDate()+"日 "+String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");
    return '<div class="rem-item">'+
      '<div class="rem-dot"></div>'+
      '<div class="rem-body">'+
        '<div class="rem-text">'+escHtmlRem(r.text)+'</div>'+
        '<div class="rem-meta">'+
          '<span>'+ts+'</span>'+
          (r.noteTitle?'<span class="rem-source">📄 '+escHtmlRem(r.noteTitle)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<button class="rem-close" onclick="dismissRem('+i+')" title="忽略">×</button>'+
    '</div>';
  }).join("");
}

function escHtmlRem(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function dismissRem(idx){
  var list=loadReminders();
  list.splice(idx,1);
  saveReminders(list);
  renderReminders();
}

// ======== 打包下载 ========
function downloadBackup(){
  showDownloadToast();
  // 用 window.open 避免 download 属性不跟随重定向的问题
  window.open("https://github.com/quxu2020/workmind/archive/refs/heads/main.zip","_blank");
}

function showDownloadToast(){
  var t=document.createElement("div");
  t.textContent="📦 正在下载备份包...";
  t.style.cssText="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.9);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;z-index:200;pointer-events:none;transition:transform .3s ease,opacity .3s ease;";
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity="0";setTimeout(function(){t.remove();},600);},3000);
}

// ======== 初始化：云端拉取 ========
pullFromCloud();
renderReminders();

// 从其他应用返回时自动从云端刷新
document.addEventListener("visibilitychange",function(){
  if(!document.hidden){pullFromCloud();}
});
</script>
</body>
</html>
